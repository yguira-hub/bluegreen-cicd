upstream active_app {
    server host.docker.internal:8080;
}
server {
    listen 80;
    server_name _;
    location / {
        proxy_pass http://active_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health {
        proxy_pass http://active_app/health;
    }
}
